[build-system]
requires = ["hatchling>=1.24"]
build-backend = "hatchling.build"

[project]
name = "verser2-guest-python"
version = "0.3.1"
description = "Python ASGI Guest package for Verser2."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Signicode" }]
dependencies = ["cryptography>=42,<47", "h2>=4.1,<5"]

[tool.verser2]
node-package = "@signicode/verser2-guest-python"
role = "guest"
app-interface = "ASGI 3"

[tool.hatch.build.targets.wheel]
packages = ["src/verser2_guest_python"]
