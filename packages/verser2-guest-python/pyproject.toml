[build-system]
requires = ["hatchling>=1.24"]
build-backend = "hatchling.build"

[project]
name = "verser2-guest-python"
version = "0.4.4"
description = "Python ASGI Guest package for Verser2."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Signicode" }]
dependencies = ["cryptography>=48.0.1,<50", "h2>=4.1,<5"]

[project.urls]
Homepage = "https://github.com/signicode/verser2#readme"
Repository = "https://github.com/signicode/verser2"
Issues = "https://github.com/signicode/verser2/issues"
Documentation = "https://github.com/signicode/verser2/tree/main/docs"

[tool.verser2]
node-package = "@signicode/verser2-guest-python"
role = "guest"
app-interface = "ASGI 3"

[tool.hatch.build.targets.wheel]
packages = ["src/verser2_guest_python"]
