version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 0
    groups:
      npm-dependencies:
        patterns:
          - '*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 0
    groups:
      github-actions:
        patterns:
          - '*'

  - package-ecosystem: pip
    directory: /packages/verser2-guest-python
    schedule:
      interval: monthly
    open-pull-requests-limit: 0
    groups:
      python-dependencies:
        patterns:
          - '*'
