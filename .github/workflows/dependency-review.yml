name: Dependency Review

on:
  # Dependency Review requires GitHub's dependency graph, which is not available
  # while this repository remains private on the current plan/settings.
  # Re-enable pull_request once the repository is public or dependency graph is
  # available.
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Review dependency changes
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
