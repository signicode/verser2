name: Package publish readiness

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main
    tags:
      - 'v*'
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      publish_npmjs:
        description: 'Publish staged JavaScript packages to npmjs.org after validation and environment approval.'
        type: boolean
        required: true
        default: false
      npmjs_version:
        description: 'Exact semver version to publish to npmjs.org, for example 1.2.3 or 1.2.3-rc.1.'
        type: string
        required: true
      npmjs_dry_run:
        description: 'Run npm publish with --dry-run instead of publishing.'
        type: boolean
        required: true
        default: true

jobs:
  detect-package-changes:
    name: Detect package-affecting changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_validate: ${{ steps.check.outputs.should_validate }}
      should_publish_sha: ${{ steps.check.outputs.should_publish_sha }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Classify changes
        id: check
        run: |
          EVENT_NAME="${{ github.event_name }}"
          REF_TYPE="${{ github.ref_type }}"

          if [ "$EVENT_NAME" = "pull_request" ]; then
            echo "change_type=package-affecting"
            echo "should_validate=true" >> "$GITHUB_OUTPUT"
            echo "should_publish_sha=false" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "change_type=manual-release"
            echo "should_validate=true" >> "$GITHUB_OUTPUT"
            echo "should_publish_sha=false" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT_NAME" = "push" ] && [ "$REF_TYPE" = "tag" ]; then
            echo "change_type=package-affecting"
            echo "should_validate=true" >> "$GITHUB_OUTPUT"
            echo "should_publish_sha=false" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT_NAME" = "schedule" ]; then
            echo "change_type=package-affecting"
            echo "should_validate=true" >> "$GITHUB_OUTPUT"
            echo "should_publish_sha=false" >> "$GITHUB_OUTPUT"
          else
            BASE_SHA="${{ github.event.before }}"
            if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
              BASE_SHA="HEAD^"
            fi
            CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "${{ github.sha }}" 2>/dev/null || echo "")
            PACKAGE_AFFECTING=false
            RELEASE_DOCS=false
            CONDUCTOR_ONLY=true
            OTHER_CHANGES=false

            for file in $CHANGED_FILES; do
              case "$file" in
                .github/workflows/package-publish.yml | packages/* | scripts/* | test/* | package.json | package-lock.json | tsconfig*.json | biome*)
                  PACKAGE_AFFECTING=true
                  CONDUCTOR_ONLY=false
                  ;;
                docs/release-procedure.md | docs/package-publishing.md)
                  RELEASE_DOCS=true
                  CONDUCTOR_ONLY=false
                  ;;
                conductor/*)
                  ;;
                docs/*)
                  CONDUCTOR_ONLY=false
                  ;;
                *)
                  CONDUCTOR_ONLY=false
                  OTHER_CHANGES=true
                  ;;
              esac
            done

            if [ "$PACKAGE_AFFECTING" = "true" ]; then
              echo "change_type=package-affecting"
              echo "should_validate=true" >> "$GITHUB_OUTPUT"
              echo "should_publish_sha=true" >> "$GITHUB_OUTPUT"
            elif [ "$RELEASE_DOCS" = "true" ]; then
              echo "change_type=release-docs"
              echo "should_validate=true" >> "$GITHUB_OUTPUT"
              echo "should_publish_sha=false" >> "$GITHUB_OUTPUT"
            elif [ "$CONDUCTOR_ONLY" = "true" ]; then
              echo "change_type=conductor-only"
              echo "should_validate=false" >> "$GITHUB_OUTPUT"
              echo "should_publish_sha=false" >> "$GITHUB_OUTPUT"
            elif [ "$OTHER_CHANGES" = "true" ]; then
              echo "change_type=package-affecting"
              echo "should_validate=true" >> "$GITHUB_OUTPUT"
              echo "should_publish_sha=true" >> "$GITHUB_OUTPUT"
            else
              echo "change_type=docs-only"
              echo "should_validate=false" >> "$GITHUB_OUTPUT"
              echo "should_publish_sha=false" >> "$GITHUB_OUTPUT"
            fi
          fi

  package-validation:
    name: Build, stage, pack, and consume without publishing
    runs-on: ubuntu-latest
    needs: detect-package-changes
    if: ${{ needs.detect-package-changes.outputs.should_validate == 'true' }}
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup Node for GitHub Packages
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@signicode'
          cache: npm

      - name: Setup Python uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: npm ci

      - name: Build and stage packages
        run: |
          npm run build
          npm run stage:packages

      - name: Upload reusable package build output
        uses: actions/upload-artifact@v7
        with:
          name: package-build-output
          path: |
            dist/packages
            packages/verser2-guest-python/dist/python
          if-no-files-found: error

      - name: Validate consumers from staged and tarball sources
        run: |
          npm run test:package-consumers -- --source=staging
          npm run test:package-consumers -- --source=tarball
          npm run test:package-tarballs

      - name: Run source tests and lint
        run: |
          node --test test/*.test.js
          npm run lint

      - name: Confirm validation job never publishes packages
        run: |
          echo "Pull requests and validation-only runs stop after build, staging, packing, and tests."

  package-publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: [detect-package-changes, package-validation]
    if: ${{ github.event_name != 'pull_request' && (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'schedule' || needs.detect-package-changes.outputs.should_publish_sha == 'true') }}
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup Node for GitHub Packages
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@signicode'
          cache: npm

      - name: Setup Python uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: npm ci

      - name: Download validated package build output
        uses: actions/download-artifact@v4
        with:
          name: package-build-output
          path: .

      - name: Resolve publish version and dist-tag
        id: publish-metadata
        run: |
          # Determine publish kind based on trigger
          publishKind=""
          if [ "${{ github.ref_type }}" = "tag" ]; then
            publishKind="tag-release"
            echo "publish_kind=tag-release"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            publishKind="nightly"
            echo "publish_kind=nightly"
          elif [ "${{ needs.detect-package-changes.outputs.should_publish_sha == 'true' }}" = "true" ]; then
            publishKind="merged-pr-sha"
            echo "publish_kind=merged-pr-sha"
          fi

          echo '--publish-kind "${publishKind}"'
          export PUBLISH_KIND="${publishKind}"

          node <<'NODE' > "$GITHUB_OUTPUT"
          const fs = require('node:fs');
          const path = require('node:path');
          const policy = require('./scripts/package-version-policy');

          const refType = process.env.GITHUB_REF_TYPE;
          const refName = process.env.GITHUB_REF_NAME;
          const sha = process.env.GITHUB_SHA;
          const publishKind = process.env.PUBLISH_KIND || '';
          const nightlyDate = new Date().toISOString().slice(0, 10).replace(/-/g, '');

          let sourceVersion;
          if (refType === 'tag') {
            sourceVersion = refName.startsWith('v') ? refName.slice(1) : refName;
          } else {
            sourceVersion = JSON.parse(
              fs.readFileSync(
                path.join(process.cwd(), 'packages', 'verser-common', 'package.json'),
                'utf8',
              ),
            ).version;
          }

          const summary = policy.getPolicySummary({
            version: sourceVersion,
            publishKind: publishKind || undefined,
            sha,
            nightlyDate,
          });

          const publishVersion = summary.computedVersion;
          console.log(`publish_version=${publishVersion}`);
          console.log(`python_version=${policy.toPythonVersion(publishVersion)}`);
          console.log(`dist_tag=${summary.distTag}`);
          NODE

        env:
          GITHUB_REF_TYPE: ${{ github.ref_type }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}

      - name: Apply publish version to staged packages
        run: |
          npm run package:version-policy -- --version "${{ steps.publish-metadata.outputs.publish_version }}" --apply-staged

      - name: Apply publish version to Python project
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const pyprojectPath = 'packages/verser2-guest-python/pyproject.toml';
          const version = process.env.PUBLISH_VERSION;
          const pyproject = fs.readFileSync(pyprojectPath, 'utf8');
          fs.writeFileSync(
            pyprojectPath,
            pyproject.replace(/^version = ".*"$/m, `version = "${version}"`),
            'utf8',
          );
          NODE
        env:
          PUBLISH_VERSION: ${{ steps.publish-metadata.outputs.python_version }}

      - name: Build versioned Python distribution
        run: |
          rm -rf packages/verser2-guest-python/dist/python
          uv build --project packages/verser2-guest-python --out-dir packages/verser2-guest-python/dist/python

      - name: Validate versioned staged and tarball consumers
        run: |
          npm run test:package-consumers -- --source=staging
          npm run test:package-consumers -- --source=tarball
          npm run test:package-tarballs

      - name: Publish staged packages to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for packageDirectory in dist/packages/*;
          do
            (cd "$packageDirectory" && npm publish --access public --tag "${{ steps.publish-metadata.outputs.dist_tag }}" --registry https://npm.pkg.github.com)
          done

      - name: Upload Python distribution artifact
        uses: actions/upload-artifact@v7
        with:
          name: verser2-guest-python-${{ steps.publish-metadata.outputs.publish_version }}
          path: packages/verser2-guest-python/dist/python/*
          if-no-files-found: error

      - name: Attach Python distribution to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: packages/verser2-guest-python/dist/python/*

      - name: Validate GitHub Packages installation
        if: github.event_name == 'push'
        env:
          VERSER_RUN_GITHUB_CONSUMER_TESTS: 1
          VERSER_GITHUB_PACKAGE_VERSION: ${{ steps.publish-metadata.outputs.publish_version }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run test:package-consumers -- --source=github

  npmjs-publish:
    name: Publish to npmjs.org
    runs-on: ubuntu-latest
    needs: [detect-package-changes, package-validation]
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_npmjs == true }}
    environment: npmjs-release
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup Node for npmjs.org
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
          scope: '@signicode'
          cache: npm

      - name: Setup Python uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: npm ci

      - name: Download validated package build output
        uses: actions/download-artifact@v4
        with:
          name: package-build-output
          path: .

      - name: Resolve npmjs publish metadata
        id: npmjs-metadata
        env:
          NPMJS_VERSION: ${{ inputs.npmjs_version }}
        run: |
          node <<'NODE' > "$GITHUB_OUTPUT"
          const policy = require('./scripts/package-version-policy');
          const version = process.env.NPMJS_VERSION;
          const summary = policy.getPolicySummary({
            version,
            publishKind: 'manual-npmjs-candidate',
          });

          if (!summary.npmJsPublishAllowed) {
            throw new Error('npmjs publishing is not allowed for this candidate');
          }

          console.log(`publish_version=${summary.computedVersion}`);
          console.log(`dist_tag=${summary.distTag}`);
          NODE

      - name: Apply npmjs publish version to staged packages
        run: |
          npm run package:version-policy -- --version "${{ steps.npmjs-metadata.outputs.publish_version }}" --apply-staged

      - name: Validate npmjs versioned staged packages
        run: |
          npm run test:package-consumers -- --source=staging
          npm run test:package-consumers -- --source=tarball
          npm run test:package-tarballs

      - name: Publish staged packages to npmjs.org
        run: |
          publishFlags=""
          if [ "${{ inputs.npmjs_dry_run }}" = "true" ]; then
            publishFlags="--dry-run"
          fi

          for packageDirectory in dist/packages/*;
          do
            (cd "$packageDirectory" && npm publish --access public --tag "${{ steps.npmjs-metadata.outputs.dist_tag }}" --registry https://registry.npmjs.org/ --provenance $publishFlags)
          done
